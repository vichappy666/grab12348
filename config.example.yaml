# ==== 12348 抢班次配置（模板）====
# 复制本文件为 config.yaml 再填写。config.yaml 已被 .gitignore 忽略，不会泄露 token。

auth:
  # 登录后从浏览器复制的 token（Bearer 后面那一长串）。获取方法见 README。
  token: "在这里粘贴你的token"
  # 一般不用改
  base_url: "https://gd.12348.gov.cn/cloudexamh5/cloudh5api"
  # 单次请求超时（秒）。政府服务器较慢，默认 20；查询类请求超时会自动重试。
  timeout: 20

target:
  # 要抢哪几天的班。"auto" = 按放班规则自动算（周六/周日自动跳过、不抢）：
  #   周一 13:00 放 周二/周三/周四 的班；周四 13:00 放 周五/(周六周日跳过)/下周一 的班。
  # 也可写死具体日期（可多填、可与 auto 混用）：- "2026-07-10"
  dates:
    - "auto"

  # 同一个班次分「优/普」两种场次，优先抢哪种：优 或 普
  prefer: "优"

  # 班次顺位（从高到低，精确匹配代码：写 C 只命中 C，不会碰 C1/C3）。
  # 每天各抢一个：按该天顺位从高到低抢，上一顺位满了自动落到下一顺位。
  # 周一/二/三/四（周六周日不抢）用这套：
  order: [C, B, D, E, F, C3, C1, R, G]

  # 周五单独一套（其他班次不考虑）：
  order_friday: [C, B, D]

  # 想让周六/周日也抢？把想要的顺位加进代码 targeting.py 的 WEEKEND 处理即可（默认不抢）。

grab:
  # 放班开抢时刻。脚本会等到这一刻再开抢。平台目前 13:00 放班（原为 18:00）。
  #   auto     ： 自动等下一个放班时刻（周一/周四 13:00），推荐
  #   绝对时间 ： "2026-07-10 13:00:00"
  #   只写时刻 ： "13:00:00"（今天，若已过则顺延到明天）
  #   留空     ： 不定时，运行即开抢
  start_at: "auto"

  poll_interval: 0.25   # 每轮拉列表的最小间隔（秒）。越小越快也越频繁，0.2~0.5 较稳妥
  duration: 120         # 开抢后最多持续多少秒
  parallel: 3           # 同时并发抢的班次数（per_day 模式下=同时并发处理几天）
  lead_ms: 300          # 定时模式下，提前多少毫秒进入开抢循环
  aggressive: false     # true=到点不等列表确认名额，直接对已知班次盲抢（秒光场景更猛）

  # true=每个目标日期各抢一个班：抢到就锁定该天，同天按 order/order_friday 顺位（上一顺位满了退下一个）。
  # false=只按 stop_after 抢到 N 个就停，不区分日期。
  per_day: true
  stop_after: 1         # 仅 per_day=false 时生效：抢到几个班就停
