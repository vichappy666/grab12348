# ==== 12348 抢班次配置（模板）====
# 复制本文件为 config.yaml 再填写。config.yaml 已被 .gitignore 忽略，不会泄露 token。

auth:
  # 登录后从浏览器复制的 token（Bearer 后面那一长串）。获取方法见 README。
  token: "在这里粘贴你的token"
  # 一般不用改
  base_url: "https://gd.12348.gov.cn/cloudexamh5/cloudh5api"

target:
  # 要抢哪几天的班（可多填）。形如 2026-05-22
  dates:
    - "2026-05-22"

  # 偏好的班次名，按优先级从高到低排。支持子串匹配：
  #   填 "C1" 能匹配 "C1（2026-普）"；填完整名也行。
  # 留空 = 该日期下所有有名额的班次都抢（抢到任意一个就停）。
  shift_names:
    - "C1"
    - "B"

  # 可选：只要开始时间在这个区间内的班（"HH:MM"）。不需要就留空。
  time_after: ""      # 例如 "08:00"，只要 08:00 及以后开始的
  time_before: ""     # 例如 "12:00"

grab:
  # 放班开抢时刻。脚本会等到这一刻再开抢。
  #   绝对时间： "2026-05-20 00:00:00"
  #   只写时刻： "00:00:00"（今天，若已过则顺延到明天）
  #   留空    ： 不定时，运行即开抢
  start_at: ""

  poll_interval: 0.25   # 每轮拉列表的最小间隔（秒）。越小越快也越频繁，0.2~0.5 较稳妥
  duration: 120         # 开抢后最多持续多少秒
  parallel: 3           # 同时并发抢优先级最高的前 N 个班次
  stop_after: 1         # 抢到几个就停（一般 1）
  lead_ms: 300          # 定时模式下，提前多少毫秒进入开抢循环
  aggressive: false     # true=到点不等列表确认名额，直接对已知班次盲抢（秒光场景更猛）
